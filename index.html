<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roulette</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="marquee">

    <span class="eyebrow">Un lot vous attend</span>
    <h1>🎰 Roulette</h1>
    <p class="tagline">Tentez votre chance et gagnez un lot !</p>

    <input
      id="email"
      type="email"
      placeholder="ton-email@exemple.fr"
      autocomplete="email"
    >

    <button class="btn-play" onclick="play()" id="playBtn">
      🎰 Lancer
    </button>

    <div id="wheel">
      <img src="LOGO.jpg" alt="le logo mon reuf">
    </div>

    <div id="result-wrap">
      <h2 id="result" style="display:none;"></h2>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>

</html>
