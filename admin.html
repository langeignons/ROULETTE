<!DOCTYPE html>
<html lang="fr">
<script src="admin.js"></script>
<head>
<meta charset="UTF-8">
<title>Admin Roulette</title>

<style>

body {
    font-family: Arial;
    max-width: 800px;
    margin: 40px auto;
}

input, button {
    padding: 10px;
    margin: 5px;
}

.card {
    border:1px solid #ccc;
    padding:15px;
    margin:10px 0;
}

</style>

</head>


<body>

<div id="login">

<input id="username" placeholder="Utilisateur">

<input id="password" placeholder="Mot de passe" type="password">

<button onclick="login()">
Connexion
</button>

</div>

<div id="adminPanel" style="display:none;">

<h1>🎰 Administration Roulette</h1>


<h2>Ajouter un loot</h2>

<input id="name" placeholder="Nom du lot">

<input id="probability" placeholder="Chance (ex: 0.01)">

<input id="stock" placeholder="Stock">

<input id="stock" type="number" value="1" min="0">


<button onclick="addPrize()">
Ajouter
</button>



<h2>Lots actuels</h2>

<div id="prizes"></div>


<h2>👥 Participants</h2>

<button onclick="loadParticipants()">
Voir les participants
</button>


<table border="1">

<thead>

<tr>
<th>Email</th>
<th>Appareil</th>
<th>Gain</th>
<th>Date</th>
<th>Action</th>
</tr>

</thead>


<tbody id="participants">

</tbody>


</table>



<h2>Test roulette</h2>

<button onclick="testRoulette()">
🎰 Lancer
</button>

</div>


<h3 id="result"></h3>




</body>

</html>
